name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast path: the GUI-free core crate builds and tests anywhere, no system
  # libraries required. This is the gate most changes need.
  core:
    name: core (envyou-core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (core)
        run: cargo clippy -p envyou-core --all-targets -- -D warnings
      - name: Test (core)
        run: cargo test -p envyou-core
      - name: Test (core, issuer feature)
        run: cargo test -p envyou-core --features issuer

  # Full workspace including the Tauri desktop shell. Compiles on all three
  # target OSes so a change that only breaks the GUI crate is still caught;
  # the workspace test suite runs on Linux (where the adapter tests live).
  desktop:
    name: desktop (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            file
      - name: Build workspace
        run: cargo build --workspace
      - name: Test workspace (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --workspace
