name: Release

# Push a tag like v0.1.0 to build signed desktop bundles for macOS, Windows and
# Linux and attach them to a (draft) GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to create + release (e.g. v0.1.1)"
        required: true
        default: "v0.1.1"

permissions:
  contents: write # tauri-action needs this to create the release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          # Windows builds are currently UNSIGNED (SmartScreen "Run anyway").
          # macOS is intentionally not built yet — "coming soon". Both get proper
          # code signing later (SignPath/SSL.com for Windows, Apple for macOS).
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            file

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "envyou ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: "Download the installer for your OS below. See the README for install and Claude Desktop / MCP setup."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
