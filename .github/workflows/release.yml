name: Release

# Push a tag like v0.1.0 to build signed desktop bundles for macOS, Windows and
# Linux and attach them to a (draft) GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag to create + release (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write # tauri-action needs this to create the release

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: "--config sign.win.json"
          # macOS is intentionally not built yet — "coming soon". Signing it
          # requires the Apple Developer Program; add a macos-latest entry with
          # --target universal-apple-darwin + APPLE_* secrets when ready.
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            file

      # ---- Windows code signing via Azure Trusted Signing ----
      - name: Install trusted-signing-cli (Windows)
        if: matrix.platform == 'windows-latest'
        run: cargo install trusted-signing-cli@0.5.0

      - name: Write Windows signing config
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cat > sign.win.json <<'JSON'
          { "bundle": { "windows": { "signCommand": "trusted-signing-cli -e __ENDPOINT__ -a __ACCOUNT__ -c __PROFILE__ %1" } } }
          JSON
          sed -i "s|__ENDPOINT__|${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}|; s|__ACCOUNT__|${{ secrets.AZURE_CODE_SIGNING_ACCOUNT }}|; s|__PROFILE__|${{ secrets.AZURE_CERT_PROFILE }}|" sign.win.json

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Windows: Azure Trusted Signing credentials (used by trusted-signing-cli) ----
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        with:
          tagName: ${{ github.event.inputs.version || github.ref_name }}
          releaseName: "envyou ${{ github.event.inputs.version || github.ref_name }}"
          releaseBody: "Download the installer for your OS below. See the README for install and Claude Desktop / MCP setup."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
